# Credit Card Fraud Detection Configuration

project:
  name: credit_card_fraud_detection
  version: 1.0.0
  seed: 42

directories:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  models_dir: "models"
  visuals_dir: "visuals"
  reports_dir: "reports"
  logs_dir: "logs"

data:
  raw_filename: "creditcard.csv"
  target_column: "Class"
  test_size: 0.2
  stratify: true
  scaling_columns:
    - "Time"
    - "Amount"
  outlier_capping_columns:
    - "Amount"
  winsorize_quantile: 0.999

models:
  baseline:
    name: "logistic_regression_baseline"
    type: "LogisticRegression"
    params:
      class_weight: "balanced"
      max_iter: 1000
      random_state: 42
      solver: "lbfgs"
  
  champion:
    name: "random_forest_champion"
    type: "RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
      n_jobs: -1
    tuning:
      cv_folds: 5
      n_iter: 10
      param_distributions:
        n_estimators: [50, 100, 200]
        max_depth: [5, 10, 15, null]
        min_samples_split: [2, 5, 10]
        min_samples_leaf: [1, 2, 4]
        max_features: ["sqrt", "log2", null]
